<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The YouTube Dump</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="card">
    <header class="head">
      <div class="dot"></div>
      <h1>The YouTube Dump</h1>
    </header>

    <!-- Step 1: link -->
    <label class="field-label" for="url">YouTube link</label>
    <div class="row">
      <input id="url" type="text" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" spellcheck="false" />
      <button id="fetchBtn" class="btn primary">Fetch</button>
    </div>

    <p id="status" class="status" hidden></p>

    <!-- Step 2: options (revealed after fetch) -->
    <section id="options" class="options" hidden>
      <div id="videoTitle" class="video-title"></div>
      <div class="range-readout">
        <span id="vidStart">00:00:00</span>
        <span class="ra">&rarr;</span>
        <span id="vidEnd">--:--:--</span>
        <span class="rl">full length</span>
      </div>

      <div class="seg" role="tablist" aria-label="Range">
        <button class="seg-btn active" data-mode="full">Full video</button>
        <button class="seg-btn" data-mode="trim">Trim</button>
      </div>

      <div id="trimFields" class="trim">
        <div class="time-col">
          <label class="field-label" for="start">Start</label>
          <div class="time-control">
            <input id="start" class="time" type="text" inputmode="numeric" placeholder="HH:MM:SS" value="00:00:00" disabled />
            <div class="steppers">
              <button class="step" type="button" data-target="start" data-dir="1" aria-label="increase start">&#9650;</button>
              <button class="step" type="button" data-target="start" data-dir="-1" aria-label="decrease start">&#9660;</button>
            </div>
            <div class="tooltip" id="start-tip"></div>
          </div>
        </div>

        <span class="arrow">&rarr;</span>

        <div class="time-col">
          <label class="field-label" for="end">End</label>
          <div class="time-control">
            <input id="end" class="time" type="text" inputmode="numeric" placeholder="HH:MM:SS" disabled />
            <div class="steppers">
              <button class="step" type="button" data-target="end" data-dir="1" aria-label="increase end">&#9650;</button>
              <button class="step" type="button" data-target="end" data-dir="-1" aria-label="decrease end">&#9660;</button>
            </div>
            <div class="tooltip" id="end-tip"></div>
          </div>
        </div>
      </div>

      <label class="field-label" for="quality">Quality</label>
      <select id="quality" class="select"></select>

      <button id="downloadBtn" class="btn primary full">Download</button>

      <!-- progress -->
      <div id="progress" class="progress" hidden>
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
        <div class="progress-meta">
          <span id="progressStage">Starting&hellip;</span>
          <span id="progressPct">0%</span>
        </div>
      </div>

      <p id="doneMsg" class="done-msg" hidden>Saved! Check Your Downloads Folder.</p>
      
      <p class="hint">Sizes are estimates. Above 1080p re-encodes (slower).</p>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
